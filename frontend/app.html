<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./clubs.html" />
    <title>Перенаправление…</title>
  </head>
  <body>
    <p><a href="./clubs.html">Перейти в каталог клубов</a></p>
    <script>
      const principal = localStorage.getItem("principal");
      const token = localStorage.getItem("access_token");
      if (!token) location.replace("./login.html");
      else if (principal === "admin") location.replace("./admin.html");
      else location.replace("./clubs.html");
    </script>
  </body>
</html>
