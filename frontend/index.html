<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PC Club Booking</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>PC Club Booking</h1>
      <p class="muted">Страница 1: регистрация и вход.</p>

      <section class="card">
        <h2>Авторизация</h2>
        <form id="authForm" class="form">
          <label class="field">
            <span>Тип аккаунта</span>
            <select name="principal">
              <option value="user">Пользователь</option>
              <option value="admin">Администратор</option>
            </select>
          </label>
          <label class="field">
            <span>Режим</span>
            <select name="mode">
              <option value="login">Вход</option>
              <option value="register">Регистрация</option>
            </select>
          </label>
          <label class="field">
            <span>Логин (email или username для входа)</span>
            <input name="login" type="text" placeholder="user@example.com" />
          </label>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="user@example.com" />
          </label>
          <label class="field">
            <span>Username</span>
            <input name="username" type="text" placeholder="nickname" />
          </label>
          <label class="field">
            <span>Телефон (необязательно)</span>
            <input name="phone" type="tel" placeholder="+7..." />
          </label>
          <label class="field" id="adminClubField" style="display: none">
            <span>Клуб (для регистрации админа)</span>
            <select name="club_id" id="adminClubSelect"></select>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input name="password" type="password" placeholder="min 6 символов" minlength="6" required />
          </label>

          <div class="row">
            <button type="submit">Продолжить</button>
            <a class="btn secondary" id="btnGoApp" href="./app.html">Открыть кабинет</a>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Лог API</h2>
        <pre id="out" class="out" aria-live="polite"></pre>
      </section>
    </main>
    <script src="./auth.js"></script>
  </body>
</html>
