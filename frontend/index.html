<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PC Club Booking</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>PC Club Booking</h1>
      <p class="muted">Демо-клиент: авторизация, клубы, ПК, слоты, бронирование.</p>

      <section class="card">
        <h2>Авторизация</h2>
        <form id="authForm" class="form">
          <label class="field">
            <span>Тип аккаунта</span>
            <select name="principal">
              <option value="user">Пользователь</option>
              <option value="admin">Администратор</option>
            </select>
          </label>
          <label class="field">
            <span>Режим</span>
            <select name="mode">
              <option value="login">Вход</option>
              <option value="register">Регистрация</option>
            </select>
          </label>
          <label class="field">
            <span>Логин (email или username для входа)</span>
            <input name="login" type="text" placeholder="user@example.com" />
          </label>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="user@example.com" />
          </label>
          <label class="field">
            <span>Username</span>
            <input name="username" type="text" placeholder="nickname" />
          </label>
          <label class="field">
            <span>Телефон (необязательно)</span>
            <input name="phone" type="tel" placeholder="+7..." />
          </label>
          <label class="field" id="adminClubField" style="display: none">
            <span>Клуб (для регистрации админа)</span>
            <select name="club_id" id="adminClubSelect"></select>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input name="password" type="password" placeholder="min 6 символов" minlength="6" required />
          </label>

          <div class="row">
            <button type="submit">Войти / Зарегистрироваться</button>
            <button type="button" class="secondary" id="btnMe">Проверить /me</button>
            <button type="button" class="danger" id="btnLogout">Выйти</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Клубы</h2>
        <form id="clubsFilterForm" class="form inline">
          <label class="field">
            <span>Поиск</span>
            <input name="q" type="text" placeholder="название / адрес" />
          </label>
          <label class="field">
            <span>Цена от</span>
            <input name="price_gte" type="number" min="0" step="1" placeholder="0" />
          </label>
          <label class="field">
            <span>Цена до</span>
            <input name="price_lte" type="number" min="0" step="1" placeholder="500" />
          </label>
          <label class="field">
            <span>Фото</span>
            <select name="has_photo">
              <option value="">любые</option>
              <option value="1">только с фото</option>
            </select>
          </label>
          <label class="field">
            <span>Сортировка</span>
            <select name="order">
              <option value="name">по имени</option>
              <option value="-name">по имени (убыв.)</option>
              <option value="price">по цене</option>
              <option value="-price">по цене (убыв.)</option>
              <option value="id">по id</option>
            </select>
          </label>
          <label class="field">
            <span>На странице</span>
            <select name="page_size">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </label>
          <div class="row">
            <button type="submit">Применить</button>
            <button type="button" class="secondary" id="btnClubsReset">Сброс</button>
          </div>
        </form>
        <div class="row">
          <button type="button" class="secondary" id="btnLoadClubs">Загрузить</button>
          <button type="button" class="secondary" id="btnClubsPrev">←</button>
          <span class="muted" id="clubsPageInfo">стр. 1</span>
          <button type="button" class="secondary" id="btnClubsNext">→</button>
        </div>
        <div id="clubsList" class="list"></div>
      </section>

      <section class="card">
        <h2>ПК</h2>
        <p class="muted">Сначала выбери клуб, затем выбери ПК.</p>
        <form id="pcsFilterForm" class="form inline">
          <label class="field">
            <span>Поиск</span>
            <input name="q" type="text" placeholder="gpu/cpu/ram/..." />
          </label>
          <label class="field">
            <span>Статус</span>
            <select name="status">
              <option value="">любой</option>
              <option value="active">active</option>
              <option value="inactive">inactive</option>
              <option value="maintenance">maintenance</option>
            </select>
          </label>
          <label class="field">
            <span>GPU</span>
            <input name="gpu" type="text" placeholder="RTX 4070" />
          </label>
          <label class="field">
            <span>CPU</span>
            <input name="processor" type="text" placeholder="Ryzen" />
          </label>
          <label class="field">
            <span>RAM</span>
            <input name="ram" type="text" placeholder="32" />
          </label>
          <label class="field">
            <span>Накопитель</span>
            <select name="storage_type">
              <option value="">любой</option>
              <option value="SSD">SSD</option>
              <option value="HDD">HDD</option>
              <option value="SSD+HDD">SSD+HDD</option>
            </select>
          </label>
          <label class="field">
            <span>Периферия: тип</span>
            <select name="peripheral_type" id="perTypeSelect">
              <option value="">любой</option>
            </select>
          </label>
          <label class="field">
            <span>Периферия: бренд</span>
            <select name="peripheral_brand" id="perBrandSelect">
              <option value="">любой</option>
            </select>
          </label>
          <label class="field">
            <span>Периферия: модель</span>
            <select name="peripheral_model" id="perModelSelect">
              <option value="">любая</option>
            </select>
          </label>
          <label class="field">
            <span>Сортировка</span>
            <select name="order">
              <option value="number">по номеру</option>
              <option value="-number">по номеру (убыв.)</option>
              <option value="id">по id</option>
            </select>
          </label>
          <label class="field">
            <span>На странице</span>
            <select name="page_size">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </label>
          <div class="row">
            <button type="submit">Применить</button>
            <button type="button" class="secondary" id="btnPcsReset">Сброс</button>
          </div>
        </form>
        <div class="row">
          <button type="button" class="secondary" id="btnPcsPrev">←</button>
          <span class="muted" id="pcsPageInfo">стр. 1</span>
          <button type="button" class="secondary" id="btnPcsNext">→</button>
        </div>
        <div id="pcsList" class="list"></div>
      </section>

      <section class="card">
        <h2>Свободные слоты</h2>
        <form id="slotsForm" class="form inline">
          <label class="field">
            <span>Дата</span>
            <input name="date" type="date" required />
          </label>
          <label class="field">
            <span>Длительность (мин)</span>
            <input name="duration_minutes" type="number" min="30" step="30" value="60" required />
          </label>
          <label class="field">
            <span>Шаг (мин)</span>
            <input name="step_minutes" type="number" min="15" step="15" value="30" required />
          </label>
          <div class="row">
            <button type="submit">Показать слоты</button>
          </div>
        </form>
        <div id="slotsList" class="list"></div>
      </section>

      <section class="card" id="adminPanel" style="display: none">
        <h2>Панель администратора</h2>
        <p class="muted">Доступно после входа как администратор.</p>

        <div class="row">
          <button type="button" id="btnAdminLoad">Загрузить данные</button>
        </div>

        <h3>Клуб</h3>
        <form id="adminClubForm" class="form inline">
          <input type="hidden" name="id" />
          <label class="field"><span>Название</span><input name="name" type="text" /></label>
          <label class="field"><span>Адрес</span><input name="address" type="text" /></label>
          <label class="field"><span>Телефон</span><input name="phone" type="text" /></label>
          <label class="field"><span>Фото URL</span><input name="photo_url" type="text" /></label>
          <label class="field"><span>Цена (база)</span><input name="price" type="number" min="0" step="1" /></label>
          <label class="field"><span>Описание</span><input name="description" type="text" /></label>
          <div class="row">
            <button type="button" id="btnAdminSaveClub">Сохранить клуб</button>
          </div>
        </form>

        <h3>ПК</h3>
        <form id="adminPcCreateForm" class="form inline">
          <label class="field"><span>Номер</span><input name="number" type="number" min="1" step="1" required /></label>
          <label class="field"><span>CPU</span><input name="processor" type="text" /></label>
          <label class="field"><span>GPU</span><input name="gpu" type="text" /></label>
          <label class="field"><span>RAM</span><input name="ram" type="text" /></label>
          <label class="field">
            <span>Накопитель</span>
            <select name="storage_type">
              <option value="">—</option>
              <option value="SSD">SSD</option>
              <option value="HDD">HDD</option>
              <option value="SSD+HDD">SSD+HDD</option>
            </select>
          </label>
          <label class="field"><span>Монитор</span><input name="monitor_model" type="text" /></label>
          <label class="field">
            <span>Статус</span>
            <select name="status" required>
              <option value="active">active</option>
              <option value="inactive">inactive</option>
              <option value="maintenance">maintenance</option>
            </select>
          </label>
          <div class="row">
            <button type="submit">Добавить ПК</button>
          </div>
        </form>
        <div class="row">
          <button type="button" class="secondary" id="btnAdminPcsPrev">←</button>
          <span class="muted" id="adminPcsPageInfo">стр. 1</span>
          <button type="button" class="secondary" id="btnAdminPcsNext">→</button>
        </div>
        <div id="adminPcsList" class="list"></div>

        <h3>Тарифы</h3>
        <form id="adminTariffCreateForm" class="form inline">
          <label class="field">
            <span>День недели</span>
            <select name="day_of_week">
              <option value="">любой</option>
              <option value="0">Пн</option>
              <option value="1">Вт</option>
              <option value="2">Ср</option>
              <option value="3">Чт</option>
              <option value="4">Пт</option>
              <option value="5">Сб</option>
              <option value="6">Вс</option>
            </select>
          </label>
          <label class="field"><span>С</span><input name="time_from" type="time" /></label>
          <label class="field"><span>До</span><input name="time_to" type="time" /></label>
          <label class="field"><span>Цена/час</span><input name="price_per_hour" type="number" min="0" step="1" required /></label>
          <div class="row">
            <button type="submit">Добавить тариф</button>
          </div>
        </form>
        <div class="row">
          <button type="button" class="secondary" id="btnAdminTariffsPrev">←</button>
          <span class="muted" id="adminTariffsPageInfo">стр. 1</span>
          <button type="button" class="secondary" id="btnAdminTariffsNext">→</button>
        </div>
        <div id="adminTariffsList" class="list"></div>
      </section>

      <section class="card">
        <h2>Лог API</h2>
        <pre id="out" class="out" aria-live="polite"></pre>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
